services:
  backend:
    build: ./backend
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - MONGODB_URI=mongodb://mongodb:27017/servicehive
      - ACCESS_TOKEN_SECRET=your_jwt_access_secret_change_this
      - REFRESH_TOKEN_SECRET=your_jwt_refresh_secret_change_this
      - NODE_ENV=production
      - FRONTEND_URL=http://localhost
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:5001/api/v1
    depends_on:
      - backend

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
